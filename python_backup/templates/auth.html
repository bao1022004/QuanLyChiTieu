{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-xl shadow-md overflow-hidden p-8">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">
                {% if is_login %}Đăng nhập hệ thống{% else %}Đăng ký tài khoản{% endif %}
            </h2>
        </div>
        <form class="mt-8 space-y-6" action="{{ url_for('login') if is_login else url_for('register') }}" method="POST">
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="username" class="sr-only">Tên đăng nhập</label>
                    <input id="username" name="username" type="text" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Tên đăng nhập">
                </div>
                {% if not is_login %}
                <div>
                    <label for="name" class="sr-only">Họ và Tên</label>
                    <input id="name" name="name" type="text" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Họ và Tên">
                </div>
                {% endif %}
                <div>
                    <label for="password" class="sr-only">Mật khẩu</label>
                    <input id="password" name="password" type="password" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Mật khẩu">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    {% if is_login %}Đăng nhập{% else %}Đăng ký{% endif %}
                </button>
            </div>
            
            <div class="text-center text-sm text-gray-600 mt-4">
                {% if is_login %}
                    Chưa có tài khoản? <a href="{{ url_for('register') }}" class="font-medium text-indigo-600 hover:text-indigo-500">Đăng ký ngay</a>
                {% else %}
                    Đã có tài khoản? <a href="{{ url_for('login') }}" class="font-medium text-indigo-600 hover:text-indigo-500">Đăng nhập</a>
                {% endif %}
            </div>
        </form>
    </div>
</div>
{% endblock %}
