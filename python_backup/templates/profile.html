{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mt-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Cấu hình Tài khoản</h2>
    
    <form action="{{ url_for('profile') }}" method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700">Tên đăng nhập</label>
            <input type="text" disabled value="{{ current_user.username }}" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 bg-gray-100 text-gray-500 sm:text-sm">
            <p class="text-xs text-gray-500 mt-1">Không thể thay đổi tên đăng nhập.</p>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Họ và Tên</label>
            <input type="text" name="name" value="{{ current_user.name }}" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Hạn mức chi tiêu tháng (VNĐ)</label>
            <input type="number" step="0.01" name="monthly_limit" value="{{ current_user.monthly_limit }}" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            <p class="text-xs text-gray-500 mt-1">Hệ thống sẽ cảnh báo nếu tổng chi tiêu vượt quá hạn mức này.</p>
        </div>
        
        <div class="pt-4 flex justify-end">
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Lưu Thay Đổi
            </button>
        </div>
    </form>
</div>
{% endblock %}
